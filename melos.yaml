name: genui_workspace

packages:
  - "packages/**"
  - "example"

scripts:
  build_runner:
    run: melos exec -c 1 --depends-on="build_runner" -- "dart run build_runner build --delete-conflicting-outputs"
    description: Run build_runner in all required packages.
  
  analyze:
    run: melos exec -- "dart analyze . --fatal-infos"
    description: Run dart analyzer across the monorepo.