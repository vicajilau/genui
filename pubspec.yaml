name: genui_workspace
description: Monorepo for Generative UI
publish_to: none

environment:
  sdk: ^3.12.0 

workspace:
  - packages/genui_annotations
  - packages/genui_builder
  - example

dev_dependencies:
  melos: ^7.8.0

melos:
  scripts:
    build_runner:
      run: melos exec -c 1 --depends-on="build_runner" -- "dart run build_runner build --delete-conflicting-outputs" && (cd example && flutter test test/export_schemas_test.dart)
      description: Run build_runner in all required packages.
    analyze:
      run: melos exec -- "dart analyze . --fatal-infos"
      description: Run dart analyzer across the monorepo.
    format:
      run: melos exec -- "dart format --set-exit-if-changed ."
      description: Check Dart formatting across the monorepo.
    test:
      run: melos exec --dir-exists="test" -- "flutter test"
      description: Run Flutter tests in packages that contain a test directory.