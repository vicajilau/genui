# Configuration file for Dependabot version updates.
# Documentation: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # GitHub Actions workflows dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # Dart/Pub dependencies - Workspace Root
  - package-ecosystem: "pub"
    directory: "/"
    schedule:
      interval: "weekly"

  # Dart/Pub dependencies - Example App Playground
  - package-ecosystem: "pub"
    directory: "/example"
    schedule:
      interval: "weekly"

  # Dart/Pub dependencies - genui_annotations Package
  - package-ecosystem: "pub"
    directory: "/packages/genui_annotations"
    schedule:
      interval: "weekly"

  # Dart/Pub dependencies - genui_builder Package
  - package-ecosystem: "pub"
    directory: "/packages/genui_builder"
    schedule:
      interval: "weekly"
